name: Build Flutter APK

on:
  push:
    branches: [main]
    paths: [flutter/**, docker/flutter/**, docker/flutter-base/**]
  pull_request:
    paths: [flutter/**, docker/flutter/**, docker/flutter-base/**]
  release:
    types: [published]
  workflow_dispatch:

env:
  BASE_IMAGE: ghcr.io/${{ github.repository_owner }}/agentshell-flutter-base:latest

jobs:
  base-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push base image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/flutter-base/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/agentshell-flutter-base:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build:
    needs: base-image
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: read
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull base image
        run: docker pull ghcr.io/${{ github.repository_owner }}/agentshell-flutter-base:latest

      - name: Tag base image as expected name
        run: docker tag ghcr.io/${{ github.repository_owner }}/agentshell-flutter-base:latest agentshell-flutter-base:latest

      - name: Build APK
        run: ./build.sh release
        working-directory: flutter

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: agentshell-flutter-release
          path: agentshell-flutter-release.apk

      - name: Upload to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: agentshell-flutter-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
