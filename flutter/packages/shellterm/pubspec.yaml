name: shellterm
description: ShellTerm — a high-performance, zero-dependency terminal emulator for Flutter. Supports Android, Web, and Linux desktop with 256-color/true-color, VT500 escape sequences, and hybrid glyph-atlas rendering.
version: 1.0.0

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  meta: ^1.3.0
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  test: ^1.6.5
  lints: ^3.0.0
